id: sh.loft.devpod
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: sh.loft.devpod
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Tauri/WebKitGTK desktop client for creating development environments on the
  # user's actual Docker, Kubernetes, SSH and IDE setup. DevPod's model depends
  # on invoking its CLI on the host via flatpak-spawn, which requires
  # --talk-name=org.freedesktop.Flatpak. That is a sandbox-escape permission, so
  # this package deliberately ships WITHOUT it: the app is safe by default and
  # the user must opt in before host workspaces work. See the metainfo
  # description and the devpod-cli-wrapper for the exact override command.
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=ssh-auth
  - --socket=gpg-agent
  - --filesystem=home
  - --filesystem=xdg-run/keyring
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create
modules:
  # DevPod's Tauri tray support needs libayatana-appindicator3.so.1, which the
  # GNOME runtime does not ship.
  # Prebuilt ayatana tray stack (libdbusmenu, ayatana-ido, libayatana-indicator,
  # libayatana-appindicator) from https://github.com/flatpark/prebuilt, built
  # against org.gnome.Sdk//50; the tag's manifest records the exact sources,
  # pins and patches. One pinned archive instead of five source builds per app,
  # and no launchpad.net downloads at build time.
  - name: ayatana-stack
    buildsystem: simple
    build-commands:
      - cp -a ./. /app/
    sources:
      - type: archive
        url: https://github.com/flatpark/prebuilt/releases/download/ayatana-v1/ayatana-stack-ayatana-v1-gnome-50-x86_64.tar.xz
        sha256: 37a91a0840b06da5319c36275fad2b1dca906152553f295944b81f202d1476fc
  - name: devpod
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 devpod-wrapper /app/bin/sh.loft.devpod
      - install -Dm755 devpod-cli-wrapper /app/bin/devpod-cli
      - install -Dm644 sh.loft.devpod.desktop /app/share/applications/sh.loft.devpod.desktop
      - install -Dm644 sh.loft.devpod.metainfo.xml /app/share/metainfo/sh.loft.devpod.metainfo.xml
      - install -Dm644 sh.loft.devpod.png /app/share/icons/hicolor/256x256/apps/sh.loft.devpod.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: devpod.deb
        only-arches:
          - x86_64
        url: https://github.com/loft-sh/devpod/releases/download/v0.7.0-alpha.34/DevPod_0.7.0-134_amd64.deb
        sha256: 798c1bfe225a19e88ddb726c5889d484f543889e5155a173c0a6ac194c038181
        size: 43825782
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: devpod-wrapper
      - type: file
        path: devpod-cli-wrapper
      - type: file
        path: sh.loft.devpod.desktop
      - type: file
        path: sh.loft.devpod.metainfo.xml
      - type: file
        path: sh.loft.devpod.png
