# Untrusted gate: runs on every PR, including forks. NO secrets are referenced
# here, so a malicious PR can never reach the signing key or R2/Pages creds.
# It validates, tests, builds the changed apps and uploads installable bundles;
# the real signed build+publish happens on push to main.
name: pr-checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # the dead-link check diffs against the PR base
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Validate every registry descriptor
        run: |
          set -e
          shopt -s nullglob
          for d in registry/*/flatpark.yml; do
            echo "validate $d"
            node scripts/read-descriptor.mjs "$d" >/dev/null
          done
      - name: Audit every registry descriptor (review-bar guardrails)
        run: |
          set -e
          shopt -s nullglob
          for d in registry/*/flatpark.yml; do
            echo "audit $d"
            node scripts/audit-descriptor.mjs "$d"   # exit 1 on hard fail; warnings print but pass
          done
      - name: Check shield flags against the approvals doc
        run: ./scripts/check-approvals.sh
      - name: Install site deps
        working-directory: site
        run: npm ci || npm install --no-audit --no-fund
      - name: Shell test suite (build steps self-skip without flatpak-builder)
        run: bash tests/run-tests.sh
      # Scoped to the apps this PR touches (any file, not just build inputs):
      # a full-catalog sweep per PR is O(catalog) upstream fetches and lets an
      # unrelated flaky upstream block the PR. The weekly link-check workflow
      # still sweeps everything.
      - name: Dead-link check (changed apps only)
        run: |
          ids="$(./scripts/changed-apps.sh --any-change \
                   "${{ github.event.pull_request.base.sha }}" HEAD | tr '\n' ' ')"
          if [ -z "$ids" ]; then
            echo "no app changes; skipping link check"
          else
            ./scripts/check-links.sh $ids
          fi

  # Tripwire: a PR that touches CI-executed automation is gated. Two surfaces
  # qualify, and the difference matters:
  #
  #   (a) Repo-wide automation — .github, scripts, config. Runs on a repo-write
  #       token (update-check.yml) and governs every app. A new-app submission
  #       never needs to touch it.
  #   (b) A single app's resolver / update.command. Also CI-executed, but its
  #       blast radius is that one app's pin, it only runs post-merge on main,
  #       and *every* new-app PR must add one. Gating (b) unconditionally fires
  #       on 100% of the normal submission flow, which trains the maintainer to
  #       click through the very alarm that (a) depends on.
  #
  # So the discriminator is not "did a resolver change" but "whose". An external
  # contributor may bring a resolver inside a brand-new registry/<id>/ dir; they
  # may not edit one the repo already trusts. update.command shape is enforced
  # separately and unconditionally by scripts/audit-descriptor.mjs, and every
  # resolver — new or not — is still read as code per docs/pr-review.md Phase 4.2.
  #
  # For a trusted author (OWNER / MEMBER / COLLABORATOR) a hit is a notice, not a
  # failure, so the maintainer's own infra PRs aren't blocked. No secrets;
  # read-only token.
  guard-infra:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gate repo automation and existing-app resolver changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          assoc="${{ github.event.pull_request.author_association }}"

          # True when nothing existed under registry/<id>/ at the base commit.
          new_app_dir() { ! git cat-file -e "$base:registry/$1" 2>/dev/null; }

          flagged=""
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            id="${f#registry/}"; id="${id%%/*}"
            case "$f" in
              .github/*|scripts/*|config/*)
                flagged="${flagged}  - ${f} (repo-wide automation)"$'\n' ;;
              registry/*/resolve-update.sh)
                new_app_dir "$id" ||
                  flagged="${flagged}  - ${f} (resolver of an existing app)"$'\n' ;;
              registry/*/flatpark.yml)
                if ! new_app_dir "$id" &&
                   git diff "$base" HEAD -- "$f" | grep -qE '^[+-][[:space:]]*command:'; then
                  flagged="${flagged}  - ${f} (update.command of an existing app)"$'\n'
                fi ;;
            esac
          done < <(git diff --name-only "$base" HEAD)

          if [ -z "$flagged" ]; then
            echo "No repo-automation or existing-app resolver changes."
            exit 0
          fi
          printf 'Flagged changes:\n%s\n' "$flagged"
          case "$assoc" in
            OWNER|MEMBER|COLLABORATOR)
              echo "::notice::Automation change by a trusted author ($assoc) — surfaced for review, not blocking." ;;
            *)
              echo "::error::External author ($assoc) modified repo-wide automation or an existing app's resolver. A maintainer must review per docs/pr-review.md (Phase 1 high-scrutiny) before merge. Adding a resolver inside a new registry/<id>/ directory does not trip this gate."
              exit 1 ;;
          esac

  # Build the changed apps to catch manifest breakage BEFORE merge, and upload an
  # installable single-file bundle per app so the change can be test-installed
  # (extra-data is not embedded — it's fetched on install — so bundles stay tiny).
  # Runs for fork PRs too: fork `pull_request` runs get NO secrets and a read-only
  # token, and the build is signed with a throwaway in-job key, so the real
  # signing key and R2/Pages creds are never exposed. Untrusted build-commands are
  # gated by GitHub's "require approval for fork PR workflows" setting — approve a
  # fork run only after reviewing its manifest.
  build-changed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Decide first, install after: a PR with no build-relevant app changes
      # skips the whole toolchain setup (changed-apps.sh only needs git+awk).
      - name: Determine changed apps
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          ids="$(./scripts/changed-apps.sh "$base" HEAD | tr '\n' ' ')"
          echo "ids=$ids" >> "$GITHUB_OUTPUT"
          echo "changed apps: ${ids:-<none>}"
          # Apps this PR introduces: nothing existed under registry/<id>/ at base.
          # The apply_extra check downloads the full pinned artifact (hundreds of
          # MB for some apps), so it is scoped to new submissions — the moment a
          # never-before-installed unpack script first meets review.
          new_ids=""
          for id in $ids; do
            git cat-file -e "$base:registry/$id" 2>/dev/null || new_ids="$new_ids $id"
          done
          echo "new_ids=${new_ids# }" >> "$GITHUB_OUTPUT"
          echo "new apps: ${new_ids:-<none>}"
      - uses: actions/setup-node@v6
        if: steps.changed.outputs.ids != ''
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install flatpak-builder
        if: steps.changed.outputs.ids != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder ostree
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Build changed apps (throwaway signing key, no publish)
        if: steps.changed.outputs.ids != ''
        run: |
          export OUT_DIR="$PWD/out" GNUPGHOME_DIR="$PWD/.gnupg-ci"
          ./scripts/gen-signing-key.sh >/dev/null
          for id in ${{ steps.changed.outputs.ids }}; do
            echo "::group::build $id"
            ./scripts/build-app.sh "$id"
            echo "::endgroup::"
          done
      # Building proves the manifest is sound; it says nothing about whether the
      # app can be *installed*. extra-data is fetched on the user's machine and
      # unpacked by apply_extra, which a system-wide install runs as root with
      # --cap-drop ALL — a path neither the build nor a --user install exercises.
      # Runs after the build so the runtime is already installed.
      - name: Check apply_extra under a system-wide install (new apps only)
        if: steps.changed.outputs.new_ids != ''
        run: ./scripts/check-apply-extra.sh ${{ steps.changed.outputs.new_ids }}
      - name: Bundle changed apps into installable .flatpak files
        if: steps.changed.outputs.ids != ''
        run: |
          . scripts/lib/common.sh
          load_config "$PWD"            # sets REPO_DIR=$PWD/out/repo, REGISTRY_DIR
          mkdir -p out/bundles
          for id in ${{ steps.changed.outputs.ids }}; do
            load_app "$id"             # resolves APP_BRANCH the same way build-app.sh did
            flatpak build-bundle \
              --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo \
              "$REPO_DIR" "out/bundles/$id.flatpak" "$id" "$APP_BRANCH"
          done
          ls -lah out/bundles
      - name: Upload installable bundles
        if: steps.changed.outputs.ids != ''
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-bundles-pr${{ github.event.pull_request.number }}
          path: out/bundles/*.flatpak
          retention-days: 14
          if-no-files-found: error
