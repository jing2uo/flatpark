# Untrusted gate: runs on every PR, including forks. NO secrets are referenced
# here, so a malicious PR can never reach the signing key or R2/Pages creds.
# It validates, tests, builds the changed apps and uploads installable bundles;
# the real signed build+publish happens on push to main.
name: pr-checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # the dead-link check diffs against the PR base
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Validate every registry descriptor
        run: |
          set -e
          shopt -s nullglob
          for d in registry/*/flatpark.yml; do
            echo "validate $d"
            node scripts/read-descriptor.mjs "$d" >/dev/null
          done
      - name: Audit every registry descriptor (review-bar guardrails)
        run: |
          set -e
          shopt -s nullglob
          for d in registry/*/flatpark.yml; do
            echo "audit $d"
            node scripts/audit-descriptor.mjs "$d"   # exit 1 on hard fail; warnings print but pass
          done
      - name: Install site deps
        working-directory: site
        run: npm ci || npm install --no-audit --no-fund
      - name: Shell test suite (build steps self-skip without flatpak-builder)
        run: bash tests/run-tests.sh
      # Scoped to the apps this PR touches (any file, not just build inputs):
      # a full-catalog sweep per PR is O(catalog) upstream fetches and lets an
      # unrelated flaky upstream block the PR. The weekly link-check workflow
      # still sweeps everything.
      - name: Dead-link check (changed apps only)
        run: |
          ids="$(./scripts/changed-apps.sh --any-change \
                   "${{ github.event.pull_request.base.sha }}" HEAD | tr '\n' ' ')"
          if [ -z "$ids" ]; then
            echo "no app changes; skipping link check"
          else
            ./scripts/check-links.sh $ids
          fi

  # Tripwire: a PR that touches CI-executed automation (.github, scripts,
  # registry resolvers, a descriptor's update.command) is gated. These surfaces
  # run on a repo-write token in update-check.yml — a malicious resolver is a
  # real automation surface even though it never reaches the signing key. The
  # threat is an *external* contributor sneaking such a change in, so the gate
  # hard-fails only for untrusted authors; for a trusted author (OWNER / MEMBER /
  # COLLABORATOR) it just surfaces a notice and passes, so the maintainer's own
  # infra PRs aren't blocked. No secrets; read-only token.
  guard-infra:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gate infra / resolver / update.command changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          assoc="${{ github.event.pull_request.author_association }}"
          flagged=""
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            case "$f" in
              .github/*|scripts/*|registry/*/resolve-update.sh) flagged="${flagged}  - ${f}"$'\n';;
            esac
          done < <(git diff --name-only "$base" HEAD)
          # An added/removed `command:` line in any descriptor = an update.command change.
          if git diff "$base" HEAD -- 'registry/*/flatpark.yml' | grep -qE '^[+-][[:space:]]*command:'; then
            flagged="${flagged}  - registry/*/flatpark.yml (update.command)"$'\n'
          fi
          if [ -z "$flagged" ]; then
            echo "No infra/resolver/update.command changes."
            exit 0
          fi
          printf 'Flagged changes:\n%s\n' "$flagged"
          case "$assoc" in
            OWNER|MEMBER|COLLABORATOR)
              echo "::notice::Infra/automation change by a trusted author ($assoc) — surfaced for review, not blocking." ;;
            *)
              echo "::error::Infra/automation change by an external author ($assoc). A maintainer must review per docs/pr-review.md (Phase 1 high-scrutiny) before merge."
              exit 1 ;;
          esac

  # Build the changed apps to catch manifest breakage BEFORE merge, and upload an
  # installable single-file bundle per app so the change can be test-installed
  # (extra-data is not embedded — it's fetched on install — so bundles stay tiny).
  # Runs for fork PRs too: fork `pull_request` runs get NO secrets and a read-only
  # token, and the build is signed with a throwaway in-job key, so the real
  # signing key and R2/Pages creds are never exposed. Untrusted build-commands are
  # gated by GitHub's "require approval for fork PR workflows" setting — approve a
  # fork run only after reviewing its manifest.
  build-changed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Decide first, install after: a PR with no build-relevant app changes
      # skips the whole toolchain setup (changed-apps.sh only needs git+awk).
      - name: Determine changed apps
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          ids="$(./scripts/changed-apps.sh "$base" HEAD | tr '\n' ' ')"
          echo "ids=$ids" >> "$GITHUB_OUTPUT"
          echo "changed apps: ${ids:-<none>}"
      - uses: actions/setup-node@v6
        if: steps.changed.outputs.ids != ''
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install flatpak-builder
        if: steps.changed.outputs.ids != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder ostree
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Build changed apps (throwaway signing key, no publish)
        if: steps.changed.outputs.ids != ''
        run: |
          export OUT_DIR="$PWD/out" GNUPGHOME_DIR="$PWD/.gnupg-ci"
          ./scripts/gen-signing-key.sh >/dev/null
          for id in ${{ steps.changed.outputs.ids }}; do
            echo "::group::build $id"
            ./scripts/build-app.sh "$id"
            echo "::endgroup::"
          done
      - name: Bundle changed apps into installable .flatpak files
        if: steps.changed.outputs.ids != ''
        run: |
          . scripts/lib/common.sh
          load_config "$PWD"            # sets REPO_DIR=$PWD/out/repo, REGISTRY_DIR
          mkdir -p out/bundles
          for id in ${{ steps.changed.outputs.ids }}; do
            load_app "$id"             # resolves APP_BRANCH the same way build-app.sh did
            flatpak build-bundle \
              --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo \
              "$REPO_DIR" "out/bundles/$id.flatpak" "$id" "$APP_BRANCH"
          done
          ls -lah out/bundles
      - name: Upload installable bundles
        if: steps.changed.outputs.ids != ''
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-bundles-pr${{ github.event.pull_request.number }}
          path: out/bundles/*.flatpak
          retention-days: 14
          if-no-files-found: error
