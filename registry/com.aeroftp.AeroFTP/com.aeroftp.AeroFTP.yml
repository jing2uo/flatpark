id: com.aeroftp.AeroFTP
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: aeroftp
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Tauri v2 / WebKitGTK multi-protocol file client.
  # dri for hardware-accelerated WebKit rendering.
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Network is the core function: FTP/FTPS/SFTP/WebDAV/S3 and cloud providers.
  - --share=network
  # The built-in media player previews audio and video from a remote server.
  - --socket=pulseaudio
  # System tray (Tauri tray-icon).
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create
  # Saved server passwords, when the user chooses the system keyring over
  # AeroFTP's own encrypted vault.
  - --talk-name=org.freedesktop.secrets
  # Local file access. AeroFTP's local pane lists a directory tree directly:
  # get_local_files (src-tauri/src/lib.rs) calls tokio::fs::read_dir on the path
  # the pane points at. The document portal can hand over a file the user picked
  # once, but it cannot back a browsable tree, so without a --filesystem grant
  # the pane shows only ~/.var/app/com.aeroftp.AeroFTP and the user sees an empty
  # home with no error. Grant home, plus the two usual removable-media mounts,
  # because copying to and from an external drive is a core use of a transfer
  # client. This matches the permission upstream's own .deb-derived packaging
  # grants, and the permission FileZilla ships on Flathub, so it is the ecosystem
  # norm rather than a concession; it does mean the home confinement is largely
  # decorative, which the app page should state plainly rather than imply
  # otherwise.
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/run/media
modules:
  # The Tauri tray-icon dlopen-s libayatana-appindicator at startup and PANICS if
  # it is missing — and the GNOME runtime does not ship it, so the app cannot
  # even start without it.
  # Prebuilt ayatana tray stack (libdbusmenu, ayatana-ido, libayatana-indicator,
  # libayatana-appindicator) from https://github.com/flatpark/prebuilt, built
  # against org.gnome.Sdk//50; the tag's manifest records the exact sources,
  # pins and patches. One pinned archive instead of five source builds per app,
  # and no launchpad.net downloads at build time.
  - name: ayatana-stack
    buildsystem: simple
    build-commands:
      - cp -a ./. /app/
    sources:
      - type: archive
        url: https://github.com/flatpark/prebuilt/releases/download/ayatana-v1/ayatana-stack-ayatana-v1-gnome-50-x86_64.tar.xz
        sha256: 37a91a0840b06da5319c36275fad2b1dca906152553f295944b81f202d1476fc
  - name: aeroftp
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 aeroftp-wrapper /app/bin/aeroftp
      - install -Dm644 com.aeroftp.AeroFTP.desktop /app/share/applications/com.aeroftp.AeroFTP.desktop
      - install -Dm644 com.aeroftp.AeroFTP.metainfo.xml /app/share/metainfo/com.aeroftp.AeroFTP.metainfo.xml
      - install -Dm644 com.aeroftp.AeroFTP.png /app/share/icons/hicolor/256x256/apps/com.aeroftp.AeroFTP.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: aeroftp.deb
        only-arches:
          - x86_64
        url: https://github.com/axpdev-lab/aeroftp/releases/download/v4.1.4/AeroFTP_4.1.4_amd64.deb
        sha256: 8e64bfd62b293cce65375ac8175c3a6a6f24a2389c2ff941323b8e1e68b47004
        size: 71686420
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: aeroftp-wrapper
      - type: file
        path: com.aeroftp.AeroFTP.desktop
      - type: file
        path: com.aeroftp.AeroFTP.metainfo.xml
      - type: file
        path: com.aeroftp.AeroFTP.png
