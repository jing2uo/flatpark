id: com.opendronelog.OpenDroneLog
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: open-dronelog
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Tauri v2 / WebKitGTK flight-log analyzer with a bundled DuckDB.
  # dri for hardware-accelerated WebKit rendering.
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Network: encrypted DJI logs (v13+) require fetching the decryption keychain
  # from DJI's API with the user's own developer key, and the dashboard's map
  # view loads tiles. Log parsing itself is local.
  - --share=network
  # System tray (Tauri tray-icon).
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create
  # No --filesystem: logs are imported through GtkFileChooserNative, which
  # Flatpak routes to the desktop portal, so the files the user picks are granted
  # on demand. The DuckDB database lives in the XDG data dir, which Flatpak
  # redirects into the sandbox. Optional overrides are documented in the metainfo.
modules:
  # The Tauri tray-icon dlopen-s libayatana-appindicator at startup and PANICS if
  # it is missing — and the GNOME runtime does not ship it, so the app cannot
  # even start without it.
  # Prebuilt ayatana tray stack (libdbusmenu, ayatana-ido, libayatana-indicator,
  # libayatana-appindicator) from https://github.com/flatpark/prebuilt, built
  # against org.gnome.Sdk//50; the tag's manifest records the exact sources,
  # pins and patches. One pinned archive instead of five source builds per app,
  # and no launchpad.net downloads at build time.
  - name: ayatana-stack
    buildsystem: simple
    build-commands:
      - cp -a ./. /app/
    sources:
      - type: archive
        url: https://github.com/flatpark/prebuilt/releases/download/ayatana-v1/ayatana-stack-ayatana-v1-gnome-50-x86_64.tar.xz
        sha256: 37a91a0840b06da5319c36275fad2b1dca906152553f295944b81f202d1476fc
  - name: open-dronelog
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 open-dronelog-wrapper /app/bin/open-dronelog
      - install -Dm644 com.opendronelog.OpenDroneLog.desktop /app/share/applications/com.opendronelog.OpenDroneLog.desktop
      - install -Dm644 com.opendronelog.OpenDroneLog.metainfo.xml /app/share/metainfo/com.opendronelog.OpenDroneLog.metainfo.xml
      - install -Dm644 com.opendronelog.OpenDroneLog.png /app/share/icons/hicolor/512x512/apps/com.opendronelog.OpenDroneLog.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: open-dronelog.deb
        only-arches:
          - x86_64
        url: https://github.com/arpanghosh8453/open-dronelog/releases/download/3.3.0/open-dronelog_3.3.0_linux_amd64.deb
        sha256: 6a22b3048f3a8fea498dbd7a4ab5796c475b47c68fb336d96cb5aef061ee7618
        size: 17076640
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: open-dronelog-wrapper
      - type: file
        path: com.opendronelog.OpenDroneLog.desktop
      - type: file
        path: com.opendronelog.OpenDroneLog.metainfo.xml
      - type: file
        path: com.opendronelog.OpenDroneLog.png
