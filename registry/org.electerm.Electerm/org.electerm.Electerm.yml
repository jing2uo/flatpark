id: org.electerm.Electerm
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
# Electron app: use the Electron base app, which ships zypak. zypak redirects
# Chromium's SUID sandbox onto the Flatpak sandbox so the app keeps an internal
# sandbox (the wrapper runs it via zypak-wrapper) instead of --no-sandbox. The
# base is a prebuilt ref merged into the app at build time; the app stays
# self-contained.
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: electerm
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Electron (Chromium) client. The prebuilt app bundles Chromium and its own
  # ffmpeg/ANGLE; the GTK3, NSS, CUPS, ATK and X11 stacks it links come from the
  # runtime (org.freedesktop.Platform 25.08 ships them — verified, 0 missing).
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Desktop notifications.
  - --talk-name=org.freedesktop.Notifications
  # Encrypt stored credentials (Electron safeStorage) via the Secret Service.
  - --talk-name=org.freedesktop.secrets
  # Strip a leaked ELECTRON_RUN_AS_NODE from the sandbox env so the binary — and
  # zypak's spawned child/zygote processes, which the wrapper's own `unset`
  # can't reach — always start as the GUI app rather than as plain Node.
  - --unset-env=ELECTRON_RUN_AS_NODE
  # Deliberately NOT granted by default (the app works without them; users opt in
  # per the metainfo notes via `flatpak override`):
  #   --filesystem=~/.ssh:ro   -> reuse host SSH keys/config
  #   --device=all             -> serial-port (serialport) connections
  #   --filesystem=home        -> browse the whole home tree in the SFTP manager
  # File open/save otherwise goes through the portal; the app's own config lives
  # under the per-app HOME (Flatpak redirects $HOME).
modules:
  - name: electerm
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 electerm-wrapper /app/bin/electerm
      - install -Dm644 org.electerm.Electerm.desktop /app/share/applications/org.electerm.Electerm.desktop
      - install -Dm644 org.electerm.Electerm.metainfo.xml /app/share/metainfo/org.electerm.Electerm.metainfo.xml
      - install -Dm644 org.electerm.Electerm.png /app/share/icons/hicolor/512x512/apps/org.electerm.Electerm.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: electerm.tar.gz
        only-arches:
          - x86_64
        url: https://github.com/electerm/electerm/releases/download/v3.15.110/electerm-3.15.110-linux-x64.tar.gz
        sha256: 93fae9bce17a9e34a6e642ac7455c0bb98d6714e5a00a66e2af5a3728fd1597f
        size: 107839644
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: electerm-wrapper
      - type: file
        path: org.electerm.Electerm.desktop
      - type: file
        path: org.electerm.Electerm.metainfo.xml
      - type: file
        path: org.electerm.Electerm.png
