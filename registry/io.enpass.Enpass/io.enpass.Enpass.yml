id: io.enpass.Enpass
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: enpass
separate-locales: false
build-options:
  no-debuginfo: true
tags:
  - proprietary
finish-args:
  # Enpass is a Qt/X11 app. Browser extension support listens on localhost and
  # then validates the connecting browser through lsof and /proc inspection.
  - --share=ipc
  - --share=network
  - --socket=x11
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.kde.*
  - --filesystem=xdg-run/tray-icon:create
  - --own-name=org.freedesktop.secrets
  - --filesystem=xdg-documents
  # Debug bridge for browser-extension validation: host-tool shims in /app/bin
  # call flatpak-spawn --host for lsof/readlink/cat when Enpass checks the
  # browser process behind a localhost WebSocket connection.
  - --talk-name=org.freedesktop.Flatpak
modules:
  - name: enpass-fakepid
    buildsystem: simple
    build-commands:
      - cc -shared -fPIC -O2 fake-getpid.c -o libfakepid.so -ldl
      - install -Dm755 libfakepid.so /app/lib/enpass/libfakepid.so
    sources:
      - type: file
        path: fake-getpid.c

  - name: enpass
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 enpass-wrapper /app/bin/enpass
      - install -Dm755 lsof-host /app/bin/lsof
      - install -Dm755 readlink-host /app/bin/readlink
      - install -Dm755 cat-host /app/bin/cat
      - install -Dm644 io.enpass.Enpass.desktop /app/share/applications/io.enpass.Enpass.desktop
      - install -Dm644 io.enpass.Enpass.metainfo.xml /app/share/metainfo/io.enpass.Enpass.metainfo.xml
      - install -Dm644 io.enpass.Enpass.png /app/share/icons/hicolor/256x256/apps/io.enpass.Enpass.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: enpass.deb
        only-arches:
          - x86_64
        url: https://apt.enpass.io/pool/main/e/enpass/enpass_6.11.13.1957_amd64.deb
        sha256: 2d8c90643851591aff41057b380a7e87bb839bf5c5aa0ca1456144e9996c902a
        size: 46303162
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: enpass-wrapper
      - type: file
        path: lsof-host
      - type: file
        path: readlink-host
      - type: file
        path: cat-host
      - type: file
        path: io.enpass.Enpass.desktop
      - type: file
        path: io.enpass.Enpass.metainfo.xml
      - type: file
        path: io.enpass.Enpass.png
