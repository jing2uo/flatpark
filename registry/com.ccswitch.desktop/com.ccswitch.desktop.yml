id: com.ccswitch.desktop
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: cc-switch
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Tauri/WebKitGTK config manager for Claude Code / Codex / Gemini CLI.
  # dri for hardware-accelerated WebKit rendering; network for provider checks,
  # the built-in proxy and update pings.
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # System tray (Tauri tray-icon).
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create
  # Core function: read/write the live CLI configs. Scoped to exactly the files
  # and dirs cc-switch manages — NOT --filesystem=home — so the rest of $HOME
  # stays private. :create lets a missing dir/file be created on first use
  # (~/.claude.json already exists, written by Claude Code, so no :create there).
  # A custom config-dir override outside these paths would need an extra
  # `flatpak override --filesystem=...`.
  - --filesystem=~/.cc-switch:create
  - --filesystem=~/.claude:create
  - --filesystem=~/.claude.json
  - --filesystem=~/.codex:create
  - --filesystem=~/.gemini:create
  - --filesystem=~/.config/opencode:create
  - --filesystem=~/.openclaw:create
modules:
  # The Tauri tray-icon dlopen-s libayatana-appindicator at startup and PANICS if
  # it is missing — and the GNOME runtime does not ship it, so the app cannot
  # even start without it.
  # Prebuilt ayatana tray stack (libdbusmenu, ayatana-ido, libayatana-indicator,
  # libayatana-appindicator) from https://github.com/flatpark/prebuilt, built
  # against org.gnome.Sdk//50; the tag's manifest records the exact sources,
  # pins and patches. One pinned archive instead of five source builds per app,
  # and no launchpad.net downloads at build time.
  - name: ayatana-stack
    buildsystem: simple
    build-commands:
      - cp -a ./. /app/
    sources:
      - type: archive
        url: https://github.com/flatpark/prebuilt/releases/download/ayatana-v1/ayatana-stack-ayatana-v1-gnome-50-x86_64.tar.xz
        sha256: 37a91a0840b06da5319c36275fad2b1dca906152553f295944b81f202d1476fc
  - name: cc-switch
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 cc-switch-wrapper /app/bin/cc-switch
      - install -Dm644 com.ccswitch.desktop.desktop /app/share/applications/com.ccswitch.desktop.desktop
      - install -Dm644 com.ccswitch.desktop.metainfo.xml /app/share/metainfo/com.ccswitch.desktop.metainfo.xml
      - install -Dm644 com.ccswitch.desktop.png /app/share/icons/hicolor/256x256/apps/com.ccswitch.desktop.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: cc-switch.deb
        only-arches:
          - x86_64
        url: https://github.com/farion1231/cc-switch/releases/download/v3.16.5/CC-Switch-v3.16.5-Linux-x86_64.deb
        sha256: ba1c935d56f3d1bf460aba614405cb6149722b785c8eac266490fbe849ff9096
        size: 12489082
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: cc-switch-wrapper
      - type: file
        path: com.ccswitch.desktop.desktop
      - type: file
        path: com.ccswitch.desktop.metainfo.xml
      - type: file
        path: com.ccswitch.desktop.png
