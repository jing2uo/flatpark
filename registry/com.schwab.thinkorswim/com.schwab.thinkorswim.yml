id: com.schwab.thinkorswim
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: thinkorswim
separate-locales: false
build-options:
  no-debuginfo: true
tags:
  - proprietary
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: thinkorswim
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 thinkorswim-wrapper /app/bin/thinkorswim
      - install -Dm644 com.schwab.thinkorswim.desktop /app/share/applications/com.schwab.thinkorswim.desktop
      - install -Dm644 com.schwab.thinkorswim.metainfo.xml /app/share/metainfo/com.schwab.thinkorswim.metainfo.xml
      - install -Dm644 com.schwab.thinkorswim.png /app/share/icons/hicolor/256x256/apps/com.schwab.thinkorswim.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: thinkorswim-installer.sh
        only-arches:
          - x86_64
        url: https://tosmediaserver.schwab.com/installer/InstFiles/thinkorswim_installer.sh
        sha256: 37f846f2f2826f634970d03eb77555dce58f4cc3eebc4212f548214ad1310be0
        size: 30228323
      - type: extra-data
        filename: zulu-jre.tar.gz
        only-arches:
          - x86_64
        url: https://cdn.azul.com/zulu/bin/zulu21.50.19-ca-jre21.0.11-linux_x64.tar.gz
        sha256: a080f14957bf0f2951cc6e3fb7b3cbfc3c0a324b8ef7e23c714ef58ef0d76cbd
        size: 52836205
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: thinkorswim-wrapper
      - type: file
        path: com.schwab.thinkorswim.desktop
      - type: file
        path: com.schwab.thinkorswim.metainfo.xml
      - type: file
        path: com.schwab.thinkorswim.png
