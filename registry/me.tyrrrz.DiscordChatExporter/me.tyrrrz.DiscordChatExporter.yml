id: me.tyrrrz.DiscordChatExporter
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: discordchatexporter
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # DiscordChatExporter is a self-contained .NET / Avalonia app: the upstream
  # zip bundles its own CoreCLR (libcoreclr.so) and SkiaSharp, so only X11,
  # libGL, fontconfig, libstdc++ and ICU are resolved from the runtime.
  # Avalonia's Linux backend is X11/Skia, so --socket=x11 (not fallback-x11) is
  # used deliberately: on Wayland hosts it runs through XWayland, while
  # fallback-x11 would withhold X11 there and leave the app headless.
  - --share=ipc
  # Talks to the Discord API to fetch the chat logs.
  - --share=network
  - --socket=x11
  - --device=dri
  # Exported logs (HTML/JSON/CSV + downloaded assets) land in ~/Downloads by
  # default. The auth token and app config live under the per-app HOME (Flatpak
  # redirects $HOME), so no extra grant is needed for them. A custom export
  # directory outside ~/Downloads must be granted by the user
  # (flatpak override --filesystem=...).
  - --filesystem=xdg-download
modules:
  - name: discordchatexporter
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 dce-wrapper /app/bin/discordchatexporter
      - install -Dm644 me.tyrrrz.DiscordChatExporter.desktop /app/share/applications/me.tyrrrz.DiscordChatExporter.desktop
      - install -Dm644 me.tyrrrz.DiscordChatExporter.metainfo.xml /app/share/metainfo/me.tyrrrz.DiscordChatExporter.metainfo.xml
      - install -Dm644 me.tyrrrz.DiscordChatExporter.png /app/share/icons/hicolor/256x256/apps/me.tyrrrz.DiscordChatExporter.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: dce.zip
        only-arches:
          - x86_64
        url: https://github.com/Tyrrrz/DiscordChatExporter/releases/download/2.47.3/DiscordChatExporter.linux-x64.zip
        sha256: 27d02c5c34a90c1d4dfb5004c3bec66bc8a602e876e62b25f3cc1e4c4a92d561
        size: 22136403
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: dce-wrapper
      - type: file
        path: me.tyrrrz.DiscordChatExporter.desktop
      - type: file
        path: me.tyrrrz.DiscordChatExporter.metainfo.xml
      - type: file
        path: me.tyrrrz.DiscordChatExporter.png
