# FlatPark publish configuration (Phase 0, local-first).
# Every value is env-overridable: `OUT_DIR=/tmp/x ./scripts/publish.sh`.
: "${REPO_TITLE:=FlatPark}"
: "${REPO_HOMEPAGE:=https://flatpark.org}"
: "${REPO_COMMENT:=Yet another Flatpak hub — AI-assisted welcome.}"
: "${REPO_URL:=https://dl.flatpark.org/}"
: "${REPO_FILE_URL:=${REPO_URL%/}/flatpark.flatpakrepo}"
: "${RUNTIME_REPO_URL:=https://dl.flathub.org/repo/flathub.flatpakrepo}"
: "${REMOTE_NAME:=flatpark}"
: "${RUNTIME_REMOTE_NAME:=flathub}"
: "${VERIFY_REMOTE_NAME:=$REMOTE_NAME}"
: "${REGISTRY_DIR:=$ROOT/registry}"
# Where the packaging recipes live, so the site can link each app to its
# registry/<id>/ dir (manifest, wrapper, apply_extra.sh, ...) for review.
: "${PACKAGING_REPO_URL:=https://github.com/flatpark/flatpark}"
: "${PACKAGING_BRANCH:=main}"

: "${GNUPGHOME_DIR:=$ROOT/.gnupg-flatpark}"
: "${KEY_NAME:=FlatPark Repository Signing Key}"
: "${KEY_EMAIL:=sign@flatpark.org}"

: "${OUT_DIR:=$ROOT/out}"
: "${REPO_DIR:=$OUT_DIR/repo}"
: "${PAGES_DIR:=$OUT_DIR/site}"
: "${PUBKEY_FILE:=$OUT_DIR/flatpark.pub.asc}"
