id: app.markra.Markra
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: markra
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Tauri/WebKitGTK Markdown editor. The .deb links only libwebkit2gtk-4.1-0 and
  # libgtk-3-0, both shipped by org.gnome.Platform 50. Network is a core feature
  # (AI providers, update checks); dri for hardware-accelerated WebKit rendering.
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  # Local-first: new documents live in the per-app HOME, and files opened/saved
  # elsewhere go through the file-chooser portal. Reusing a Markdown folder that
  # lives outside the sandbox is NOT granted by default — opt in per the
  # metainfo notes:
  #   --filesystem=home   -> open/keep a notes folder anywhere under $HOME
modules:
  - name: markra
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 markra-wrapper /app/bin/markra
      - install -Dm644 app.markra.Markra.desktop /app/share/applications/app.markra.Markra.desktop
      - install -Dm644 app.markra.Markra.metainfo.xml /app/share/metainfo/app.markra.Markra.metainfo.xml
      - install -Dm644 app.markra.Markra.png /app/share/icons/hicolor/256x256/apps/app.markra.Markra.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: markra.deb
        only-arches:
          - x86_64
        url: https://github.com/markrahq/markra/releases/download/v1.2.4/Markra_1.2.4_linux_x64.deb
        sha256: a3b46ec0b943329c134a7a2b17e7c588f718289f9083bf00dd08ee78ce1acf9c
        size: 10477810
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: markra-wrapper
      - type: file
        path: app.markra.Markra.desktop
      - type: file
        path: app.markra.Markra.metainfo.xml
      - type: file
        path: app.markra.Markra.png
