id: com.abdownloadmanager.AbDownloadManager
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: abdm
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Compose Desktop (Skia over OpenGL/X11) plus a bundled JRE/AWT. The app and
  # its JRE are self-contained; only X11, libGL, fontconfig and libstdc++ are
  # resolved from the runtime. skiko's Linux backend is X11/GLX only (no
  # libwayland), so X11 is required — and --socket=x11 (not fallback-x11) is
  # used deliberately: on Wayland hosts it runs through XWayland, while
  # fallback-x11 would withhold X11 there and leave the app headless.
  - --share=ipc
  # Network for the downloads themselves, and so the browser-integration
  # extension can reach the app's local listener over the shared loopback.
  - --share=network
  - --socket=x11
  - --device=dri
  # Download-complete desktop notifications and the system-tray icon.
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Default download location. The app's own config lives under the per-app HOME
  # (Flatpak redirects $HOME), so no extra grant is needed for it. Custom
  # download directories outside ~/Downloads must be granted by the user
  # (flatpak override --filesystem=...).
  - --filesystem=xdg-download
modules:
  - name: ab-download-manager
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 abdm-wrapper /app/bin/abdm
      - install -Dm644 com.abdownloadmanager.AbDownloadManager.desktop /app/share/applications/com.abdownloadmanager.AbDownloadManager.desktop
      - install -Dm644 com.abdownloadmanager.AbDownloadManager.metainfo.xml /app/share/metainfo/com.abdownloadmanager.AbDownloadManager.metainfo.xml
      - install -Dm644 com.abdownloadmanager.AbDownloadManager.png /app/share/icons/hicolor/512x512/apps/com.abdownloadmanager.AbDownloadManager.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: abdm.tar.gz
        only-arches:
          - x86_64
        url: https://github.com/amir1376/ab-download-manager/releases/download/v1.9.2/ABDownloadManager_1.9.2_linux_x64.tar.gz
        sha256: f80bbb0db2e34649bbccb20fd1f9767c395de8eca70cb11f30f168350577e888
        size: 91845867
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: abdm-wrapper
      - type: file
        path: com.abdownloadmanager.AbDownloadManager.desktop
      - type: file
        path: com.abdownloadmanager.AbDownloadManager.metainfo.xml
      - type: file
        path: com.abdownloadmanager.AbDownloadManager.png
