id: com.dbxio.dbx
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: dbx
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Tauri/WebKitGTK database client (MySQL, PostgreSQL, SQLite, Redis, MongoDB,
  # DuckDB, ClickHouse, SQL Server, ...). network is the core function — it talks
  # to remote/local DB servers; dri for hardware-accelerated WebKit rendering.
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # System tray (Tauri tray-icon).
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create
  # JDBC-agent databases (Oracle, Dameng, KingbaseES and a dozen others) download
  # a JRE and driver jars into the hardcoded ~/.dbx/agents; without persistence
  # they are re-downloaded on every launch. Real-home :create (not --persist) so
  # the dir is user-accessible and survives a fresh first run.
  - --filesystem=~/.dbx:create
  # DuckDB extensions (quack/ducklake) and DuckDB persistent secrets live in
  # ~/.duckdb.
  - --filesystem=~/.duckdb:create
  # No --filesystem=home: dbx's own settings live in its private per-app dir, and
  # local file databases (SQLite/DuckDB) and .sql scripts are opened through the
  # file-chooser portal. To keep a local-file connection working across restarts
  # (the portal grant is per-pick), grant the path with
  # `flatpak override --user --filesystem=/path/to/db com.dbxio.dbx`.
  # No ~/.ssh by default: the SSH-tunnel feature reads ~/.ssh/config and private
  # keys (it does not write known_hosts), but keys are too sensitive to expose
  # unasked. Users who need tunnels can grant read-only access with
  # `flatpak override --user --filesystem=~/.ssh:ro com.dbxio.dbx`.
modules:
  # dbx's Tauri tray-icon dlopen-s libayatana-appindicator3.so.1 at startup (via
  # libappindicator-sys) and the GNOME runtime does not ship it.
  # Prebuilt ayatana tray stack (libdbusmenu, ayatana-ido, libayatana-indicator,
  # libayatana-appindicator) from https://github.com/flatpark/prebuilt, built
  # against org.gnome.Sdk//50; the tag's manifest records the exact sources,
  # pins and patches. One pinned archive instead of five source builds per app,
  # and no launchpad.net downloads at build time.
  - name: ayatana-stack
    buildsystem: simple
    build-commands:
      - cp -a ./. /app/
    sources:
      - type: archive
        url: https://github.com/flatpark/prebuilt/releases/download/ayatana-v1/ayatana-stack-ayatana-v1-gnome-50-x86_64.tar.xz
        sha256: 37a91a0840b06da5319c36275fad2b1dca906152553f295944b81f202d1476fc
  - name: dbx
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 dbx-wrapper /app/bin/dbx
      - install -Dm644 com.dbxio.dbx.desktop /app/share/applications/com.dbxio.dbx.desktop
      - install -Dm644 com.dbxio.dbx.metainfo.xml /app/share/metainfo/com.dbxio.dbx.metainfo.xml
      - install -Dm644 com.dbxio.dbx.png /app/share/icons/hicolor/256x256/apps/com.dbxio.dbx.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: dbx.deb
        only-arches:
          - x86_64
        url: https://github.com/t8y2/dbx/releases/download/v0.5.60/DBX_0.5.60_amd64.deb
        sha256: de28e854bde535980fe6fe0b09ae6b8d1e1ffb2a451d7f9e19679210439e1484
        size: 31659270
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: dbx-wrapper
      - type: file
        path: com.dbxio.dbx.desktop
      - type: file
        path: com.dbxio.dbx.metainfo.xml
      - type: file
        path: com.dbxio.dbx.png
