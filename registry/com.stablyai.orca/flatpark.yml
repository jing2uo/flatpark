id: com.stablyai.orca
name: Orca
summary: AI orchestrator for running coding agents side by side
website: https://onorca.dev/
source_url: https://github.com/stablyai/orca
build:
  manifest: com.stablyai.orca.yml
  branch: stable
  mode: extra-data
catalog:
  category: Development
  tags:
