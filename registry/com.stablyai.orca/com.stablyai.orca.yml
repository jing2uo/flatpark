id: com.stablyai.orca
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
# Electron app: use the Electron base app, which ships zypak. zypak redirects
# Chromium's SUID sandbox onto the Flatpak sandbox, so Orca keeps Chromium's
# internal sandbox instead of launching with --no-sandbox.
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: orca
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  # Electron IDE with terminal panes, agent orchestration, GitHub/Linear
  # integrations and mobile pairing. The prebuilt app bundles Chromium, Node
  # native modules, its relay, and CLI resources; the GTK/NSS/CUPS/X11 stack
  # comes from org.freedesktop.Platform 25.08.
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Terminal bell/audio and browser/computer-use surfaces may use audio.
  - --socket=pulseaudio
  # Desktop notifications for completed agents and mobile pairing events.
  - --talk-name=org.freedesktop.Notifications
  # Electron safeStorage for locally stored tokens when a keyring is present.
  - --talk-name=org.freedesktop.secrets
  # Orca reads global orchestration skills from ~/.agents/skills, a directory
  # shared with the host agent CLIs. Granted user-accessible rather than
  # --persist so the sandbox and those host tools see the same directory;
  # :create keeps a fresh install working before the directory exists.
  - --filesystem=~/.agents:create
  # Host command bridge: the wrapper generates a runtime PATH directory whose
  # commands forward through flatpak-spawn --host, so Orca can use the user's
  # own installed and authorized Git, GitHub/GitLab, Node/npm/npx, and agent
  # CLIs. FlatPark does not bundle or authenticate those tools. This is
  # deliberately declared in flatpark.yml policy.dangerous_permissions and
  # requires human review.
  - --talk-name=org.freedesktop.Flatpak
  # Strip a leaked ELECTRON_RUN_AS_NODE from the sandbox env so the GUI and
  # zypak child processes do not start as plain Node.
  - --unset-env=ELECTRON_RUN_AS_NODE
  # Deliberately NOT granted by default (documented as opt-in in metainfo):
  #   --filesystem=home      -> open existing host worktrees/projects directly
  #   --filesystem=~/.ssh:ro -> let host agent/SSH flows reuse SSH config/keys
  #   --device=all           -> broad local device/computer-use access
modules:
  - name: orca
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 orca-wrapper /app/bin/orca
      - install -Dm755 orca-host-shim /app/lib/orca/orca-host-shim
      - install -Dm755 orca-setup-host-bin /app/lib/orca/orca-setup-host-bin
      - install -Dm644 com.stablyai.orca.desktop /app/share/applications/com.stablyai.orca.desktop
      - install -Dm644 com.stablyai.orca.metainfo.xml /app/share/metainfo/com.stablyai.orca.metainfo.xml
      - install -Dm644 com.stablyai.orca.png /app/share/icons/hicolor/512x512/apps/com.stablyai.orca.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: orca.deb
        only-arches:
          - x86_64
        url: https://github.com/stablyai/orca/releases/download/v1.4.152/orca-ide_1.4.152_amd64.deb
        sha256: 36f83ae1de5a3d524cea0154ef494f42953d632cf9f4e89cbb15b1f8c6b7052c
        size: 161531484
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: orca-wrapper
      - type: file
        path: orca-host-shim
      - type: file
        path: orca-setup-host-bin
      - type: file
        path: com.stablyai.orca.desktop
      - type: file
        path: com.stablyai.orca.metainfo.xml
      - type: file
        path: com.stablyai.orca.png
